<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Ventas - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .contenedor-ventas { width: 100%; max-width: 450px; padding: 15px; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <div class="contenedor-ventas">
        <div class="card shadow-lg">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0">Registrar Venta</h4>
            </div>
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre del Asistente:</label>
                    <input type="text" id="regNombre" class="form-control" placeholder="Ej: Ramiro Amaya">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">DNI:</label>
                    <input type="text" id="regDni" class="form-control" placeholder="Sin puntos ni espacios">
                </div>
            
                <button class="btn btn-success w-100 btn-lg fw-bold" onclick="registrarEntrada()">
                    GUARDAR ENTRADA
                </button>
            </div>
            <div class="card-footer text-center">
                <a href="index.html" class="text-decoration-none text-muted small">← Volver a Portería</a>
            </div>
        </div>
        <div id="status" class="mt-3"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="ventas.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portería - Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .contenedor-app { max-width: 450px; margin: 20px auto; padding: 20px; }
        #resultado { min-height: 80px; margin-top: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; background-color: #e9ecef; color: #333; }
        .stats-card { font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="contenedor-app">
        <h2 class="text-center mb-4">Control de Acceso</h2>
        
        <div class="card p-3 shadow-sm text-center">
            <label for="inputCodigo" class="form-label fw-bold">DNI del Asistente:</label>
            <input type="text" id="inputCodigo" class="form-control form-control-lg text-center" placeholder="Ingrese DNI">
            <button class="btn btn-primary btn-lg w-100 mt-3" onclick="validarAcceso()">VERIFICAR INGRESO</button>
        </div>

        <div id="resultado">Esperando DNI...</div>

        <div class="row g-2 mt-3">
            <div class="col-4"><div class="card bg-primary text-white text-center p-2 stats-card"><small>VENDIDAS</small><div id="countTotal">0</div></div></div>
            <div class="col-4"><div class="card bg-success text-white text-center p-2 stats-card"><small>ADENTRO</small><div id="countIngresos">0</div></div></div>
            <div class="col-4"><div class="card bg-warning text-dark text-center p-2 stats-card"><small>FALTAN</small><div id="countFaltan">0</div></div></div>
        </div>

        <div class="card mt-4 shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span class="small">Lista de Asistentes</span>
                <input type="text" id="buscadorTabla" class="form-control form-control-sm w-50" placeholder="🔍 Filtrar..." onkeyup="filtrarTabla()">
            </div>
            <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                <table class="table table-sm table-hover mb-0">
                    <thead><tr><th>DNI</th><th>Nombre</th><th>Estado</th></tr></thead>
                    <tbody id="tablaAsistentes"></tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="ventas.html" class="btn btn-outline-secondary btn-sm">Ir a Ventas</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
